{% extends "base.html" %}
{% load static %}

{% block titulo %}Iniciar sesión — Cine Chatarra{% endblock %}

{% block contenido %}
<section class="pagina-auth">
    <div class="auth-tarjeta">
        <div class="auth-header">
            <div class="auth-avatar">CH</div>
            <h1>Iniciar sesión</h1>
            <p class="auth-sub">Bienvenide de vuelta al Cine Club Chatarra</p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="campo-form">
                <label for="id_username">Usuario</label>
                <input type="text" name="username" id="id_username" class="input-form" placeholder="tu usuario" required autofocus>
            </div>
            <div class="campo-form">
                <label for="id_password">Contraseña</label>
                <input type="password" name="password" id="id_password" class="input-form" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Entrar</button>
        </form>

        <p class="auth-pie">
            ¿No tienes cuenta?
            <a href="{% url 'accounts:registro' %}">Regístrate aquí</a>
        </p>
    </div>
</section>
{% endblock %}
